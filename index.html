<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YallaGo - Delivery Platform</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YallaGo" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/yallago/192/192" />
    <link rel="apple-touch-startup-image" href="https://picsum.photos/seed/yallago/512/512" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="YallaGo" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://picsum.photos/seed/yallago/192/192" />
  </head>
  <body className="bg-gray-50">
    <div id="splash-screen" style="position: fixed; inset: 0; background: #0047AB; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease;">
      <div style="font-family: system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 48px; color: #FFD200; font-style: italic; text-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px;">
        <span style="color: #ffffff;">Yalla</span>Go
      </div>
      <div style="width: 40px; height: 40px; border: 4px solid #FFD200; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }, 1000);
        }
      });
    </script>
  </body>
</html>
